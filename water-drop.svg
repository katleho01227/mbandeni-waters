<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <!-- Water drop shape -->
  <defs>
    <linearGradient id="waterGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E90FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Water drop -->
  <path d="M 50 10 C 50 10, 30 40, 30 60 C 30 80, 40 100, 50 100 C 60 100, 70 80, 70 60 C 70 40, 50 10, 50 10 Z" 
        fill="url(#waterGradient)" stroke="#0066CC" stroke-width="2"/>
  
  <!-- Highlight for shine effect -->
  <ellipse cx="42" cy="35" rx="8" ry="12" fill="white" opacity="0.4"/>
</svg>